name: Release

on:
  push:
    tags: ['v*']

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run check-types
      - run: bun run lint:check
      - run: bun run test
      - run: bun run prepare-publish

      - name: Publish @graphql-suite packages
        run: |
          npm publish ./packages/schema/dist --provenance --access public || true
          npm publish ./packages/client/dist --provenance --access public || true
          npm publish ./packages/query/dist --provenance --access public || true
          npm publish ./dist/graphql-suite --provenance --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish deprecated @drizzle-graphql-suite aliases
        run: |
          npm publish ./dist/@drizzle-graphql-suite/schema --provenance --access public || true
          npm publish ./dist/@drizzle-graphql-suite/client --provenance --access public || true
          npm publish ./dist/@drizzle-graphql-suite/query --provenance --access public || true
          npm publish ./dist/drizzle-graphql-suite --provenance --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: bun install --frozen-lockfile

      - name: Build docs
        run: bun run --filter docs build

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/docs/dist --project-name=graphql-suite --branch=main
